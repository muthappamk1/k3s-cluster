apiVersion: apps/v1
kind: Deployment
metadata:
  name: k3s-app
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: k3s-app
  template:
    metadata:
      labels:
        app: k3s-app
    spec:
      containers:
      - name: k3s-app
        image: ghcr.io/muthappamk1/k3s-app:54d6ee8
        ports:
        - containerPort: 5000
        env:
        - name: APP_VERSION
          value: "1.0"
---
apiVersion: v1
kind: Service
metadata:
  name: k3s-app
  namespace: default
spec:
  type: NodePort
  selector:
    app: k3s-app
  ports:
  - port: 5000
    targetPort: 5000
    nodePort: 30500
